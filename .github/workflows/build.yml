name: Build and Release Windows EXE

on:
  push:
    tags:
      - "v*" # Dispara quando você criar uma tag tipo v1.0.0
  workflow_dispatch: # Permite disparar manualmente na aba Actions

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pdfplumber pyinstaller

      - name: Gerar FiscoCapture.exe
        run: |
          pyinstaller --onefile --windowed --name FiscoCapture main.py

      - name: Criar GitHub Release e anexar EXE
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/FiscoCapture.exe
          name: Versão ${{ github.ref_name }}
          body: |
            Executável FiscoCapture compilado para Windows 64-bit.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

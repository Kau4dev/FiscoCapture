name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # permite rodar manualmente pelo GitHub

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pdfplumber pyinstaller

      - name: Gerar FiscoCapture.exe
        run: |
          pyinstaller --onefile --windowed --name FiscoCapture main.py

      - name: Upload do executável
        uses: actions/upload-artifact@v4
        with:
          name: FiscoCapture-Windows
          path: dist/FiscoCapture.exe
          retention-days: 30
